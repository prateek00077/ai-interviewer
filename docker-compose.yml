# postgres+pgvector, redis, minio, api, worker
#
# The backing services come up by default. `api` and `worker` are behind the
# `app` profile, so day-to-day development still runs them on the host with a
# reload loop:
#
#   docker compose up -d                    # backing services only
#   docker compose --profile app up -d      # everything, containerised
#
# After `docker compose up -d`, bootstrap the roles once (CREATE ROLE is not a
# privilege Alembic should hold) and then migrate:
#
#   docker compose exec -T postgres psql -U postgres -d ai_interviewer \
#     -v owner_pw="'owner_pw'" -v app_pw="'app_pw'" < scripts/bootstrap_db.sql
#   alembic upgrade head

services:
  postgres:
    # pgvector is not needed by auth, but using the same image now avoids a
    # swap when the resume-embedding slice lands.
    image: pgvector/pgvector:pg16
    container_name: aii-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_interviewer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_interviewer"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aii-redis
    # Refresh-token records are security state, not a cache: losing them on
    # restart would make every replay read as UNKNOWN instead of REUSE.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # S3-compatible, so the same boto3 client and the same presigned-URL flow
    # work unchanged against R2 or S3 in production -- only the endpoint moves.
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: aii-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Creates the four buckets and exits. Buckets are not created by the app at
  # startup: that would need bucket-creation rights in production, where the
  # buckets are provisioned once by whoever owns the R2/S3 account.
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: aii-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      for b in resumes recordings proctoring reports; do mc mb --ignore-existing local/$$b; done &&
      echo 'buckets ready'
      "

  # --- Application ---------------------------------------------------------
  #
  # One image, two entrypoints. The API and the worker share every dependency
  # except the command, and separate images would double build time while
  # letting their dependency sets drift apart unnoticed.

  api:
    profiles: ["app"]
    build: .
    container_name: aii-api
    env_file: .env
    environment:
      # Overrides for the container network: inside compose the services are
      # reachable by name, not on localhost.
      DATABASE_URL: postgresql+asyncpg://app_user:app_pw@postgres:5432/ai_interviewer
      # The owner URL too. It is only used by Alembic, which is exactly why it
      # was missed: the API boots fine without it and `docker compose exec api
      # alembic upgrade head` -- the documented way to migrate -- then fails
      # trying to reach Postgres on the API container's own localhost.
      DATABASE_OWNER_URL: postgresql+asyncpg://app_owner:owner_pw@postgres:5432/ai_interviewer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      # The API reaches MinIO at minio:9000, but the browser it hands presigned
      # URLs to is on the host and cannot resolve that name. Sign upload/download
      # URLs with the host-reachable name instead, or every PUT fails as
      # "TypeError: Failed to fetch". See storage._presign_client.
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    profiles: ["app"]
    build: .
    container_name: aii-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:app_pw@postgres:5432/ai_interviewer
      DATABASE_OWNER_URL: postgresql+asyncpg://app_owner:owner_pw@postgres:5432/ai_interviewer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      # The report-download links the worker mints are followed by a browser too.
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
    # --concurrency=2, not the CPU-count default. These tasks are long and
    # memory-hungry -- a WeasyPrint render and a librosa decode can be resident
    # at once -- and the ceiling is the shared NIM endpoint's rate limit rather
    # than local cores.
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker",
              "--loglevel=info", "--concurrency=2"]
    # The image's HEALTHCHECK curls :8000/health, which is the API's endpoint.
    # The worker runs Celery, not uvicorn, so that check can only ever fail and
    # leave the container reporting "unhealthy". A Celery worker's liveness is
    # not an HTTP endpoint, so disable the inherited check rather than fake one.
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
